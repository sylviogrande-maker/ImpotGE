<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Impôts GE 2025">
<meta name="theme-color" content="#07090f">
<title>Impôts GE 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
:root{
  --bg:#07090f;--bg2:#0e1018;--bg3:#161923;--bg4:#1e2330;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#3b82f6;--accent-g:linear-gradient(135deg,#3b82f6,#6366f1);
  --green:#22c55e;--gold:#eab308;--red:#ef4444;
  --text:#eef2ff;--text2:#7c8db0;--text3:#3a4560;
  --r:16px;--st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.hdr{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:calc(var(--st) + 12px) 18px 10px}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.htitle{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.3px}
.htitle em{font-style:normal;background:var(--accent-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hbadge{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--border2);color:var(--text2)}
.ps-row{display:flex;justify-content:space-between;margin-bottom:5px}
.ps-lbl{font-size:11px;color:var(--text2)}.ps-pct{font-size:11px;font-weight:600;color:var(--accent)}
.ps-bar{height:3px;background:var(--bg3);border-radius:3px;overflow:hidden}
.ps-fill{height:100%;border-radius:3px;background:var(--accent-g);transition:width .5s ease}

.tabs{display:flex;gap:3px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:30px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
.tab .tb{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg3);color:var(--text2)}
.tab.active{background:var(--accent);color:#fff}
.tab.active .tb{background:rgba(255,255,255,.2);color:#fff}

.main{padding:14px 14px calc(88px + var(--sb));max-width:600px;margin:0 auto}
.slabel{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:20px 0 8px 2px}

.dl-card{background:linear-gradient(135deg,#0e1a30,#080e20);border:1px solid rgba(59,130,246,.2);border-radius:var(--r);padding:18px;margin-bottom:10px;position:relative;overflow:hidden}
.dl-card::after{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.1) 0%,transparent 70%)}
.dl-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.dl-badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6ea8fe;margin-bottom:4px}
.dl-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
.dl-cnt{text-align:right}
.dl-num{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;line-height:1;color:var(--gold)}
.dl-unit{font-size:10px;color:var(--text2)}
.dl-date{font-size:12px;color:var(--text2);margin-bottom:10px}
.dl-date strong{color:var(--text)}
.dl-pb{height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.dl-pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.dl-pl{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--text3)}

.pdf-banner{background:linear-gradient(135deg,#1a1800,#100f00);border:1px solid rgba(234,179,8,.3);border-radius:var(--r);padding:15px 16px;display:flex;align-items:center;gap:12px}
.pdf-banner-ico{font-size:26px;flex-shrink:0}
.pdf-banner-info{flex:1;min-width:0}
.pdf-banner-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px}
.pdf-banner-sub{font-size:11px;color:var(--text2)}
.pdf-btn{background:linear-gradient(135deg,#eab308,#ca8a04);color:#0a0800;border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
.pdf-btn:disabled{opacity:.35;cursor:not-allowed}

.cl-group{margin-bottom:6px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.cl-gh{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--bg2);cursor:pointer;user-select:none}
.cl-gi{font-size:17px;width:24px;text-align:center}
.cl-gn{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex:1}
.cl-gs{font-size:11px;font-weight:600;color:var(--text2)}.cl-gs.done{color:var(--green)}
.cl-chev{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}.cl-chev.open{transform:rotate(90deg)}
.cl-body{background:var(--bg2);border-top:1px solid var(--border);display:none}.cl-body.open{display:block}
.cl-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s}
.cl-item:last-child{border-bottom:none}.cl-item:active{background:var(--bg3)}.cl-item.chk{opacity:.55}
.cl-cb{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .18s}
.cl-cb.chk{background:var(--green);border-color:var(--green)}
.cl-ii{flex:1;min-width:0}
.cl-in{font-size:13px;font-weight:500;margin-bottom:1px}.cl-item.chk .cl-in{text-decoration:line-through;color:var(--text2)}
.cl-is{font-size:11px;color:var(--text2)}
.tag-scan{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(34,197,94,.12);color:var(--green);flex-shrink:0}
.tag-todo{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(59,130,246,.07);color:var(--text3);flex-shrink:0}

.doc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.doc-card:active{background:var(--bg3);transform:scale(.99)}
.doc-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-inf{flex:1;min-width:0}
.doc-nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.doc-mt{font-size:11px;color:var(--text2)}
.doc-dot-g{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.doc-dot-e{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.doc-arr{color:var(--text3);font-size:14px;flex-shrink:0}

.fab{position:fixed;bottom:calc(72px + var(--sb));right:16px;width:56px;height:56px;border-radius:50%;background:var(--accent-g);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;z-index:90;transition:transform .15s;line-height:1}
.fab:active{transform:scale(.9)}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,9,15,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--sb));display:flex;justify-content:space-around}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 20px;background:none;border:none;color:var(--text2);font-family:'Inter',sans-serif}
.ni.active{color:var(--accent)}
.ni-ico{font-size:21px}.ni-lbl{font-size:10px;font-weight:500}

.view{display:none}.view.active{display:block}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:18px 18px calc(32px + var(--sb));width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.overlay.open .modal{transform:translateY(0)}
.mhandle{width:34px;height:4px;background:var(--bg4);border-radius:4px;margin:0 auto 18px}
.mtitle{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:16px}
.flabel{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.fgroup{margin-bottom:12px}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:11px 13px;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none}
.finput:focus{border-color:var(--accent)}
.fbtn{width:100%;background:var(--accent-g);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}
.fbtn2{width:100%;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:13px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}
.fbtn-del{width:100%;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);border-radius:13px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}

.file-zone{border:2px dashed var(--border2);border-radius:12px;padding:22px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
.file-zone:active{border-color:var(--accent)}
.file-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.fz-ico{font-size:30px;margin-bottom:6px}
.fz-lbl{font-size:13px;font-weight:500;margin-bottom:3px}
.fz-sub{font-size:11px;color:var(--text2)}
.file-prev{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:10px 13px;display:flex;align-items:center;gap:10px}
.fp-ico{font-size:20px}
.fp-nm{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.fp-rm{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;flex-shrink:0;padding:0 4px}

.match-wrap{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.18);border-radius:11px;padding:11px 13px;margin-bottom:12px}
.match-hd{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.match-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.match-row:last-child{border-bottom:none}
.match-cb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.match-cb.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.match-nm{font-size:13px;font-weight:500;flex:1}
.match-grp{font-size:11px;color:var(--text2)}

.pdf-ov{position:fixed;inset:0;background:rgba(7,9,15,.97);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;opacity:0;pointer-events:none;transition:opacity .3s;padding:30px;text-align:center}
.pdf-ov.show{opacity:1;pointer-events:all}
.pdf-ov-ico{font-size:52px;line-height:1}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.pdf-ov-ico.spin{display:inline-block;animation:spin 1.4s linear infinite}
.pdf-ov-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.pdf-ov-sub{font-size:13px;color:var(--text2);min-height:20px}
.pdf-ov-bar{width:260px;height:4px;background:var(--bg3);border-radius:4px;overflow:hidden}
.pdf-ov-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f59e0b);border-radius:4px;transition:width .35s ease;width:0%}

.toast{position:fixed;top:calc(var(--st) + 66px);left:50%;transform:translateX(-50%) translateY(-8px);background:var(--bg3);border:1px solid var(--border2);border-radius:25px;padding:9px 16px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:32px 20px;color:var(--text2)}
.empty .ei{font-size:36px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
.empty p{font-size:12px;line-height:1.6}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cl-group,.doc-card,.dl-card,.pdf-banner{animation:fadeUp .25s ease both}
</style>
</head>
<body>

<div class="hdr">
  <div class="hrow">
    <div class="htitle">Impôts <em>GE 2025</em></div>
    <div class="hbadge" id="hBadge">0 / 0</div>
  </div>
  <div class="ps-row"><span class="ps-lbl">Checklist complétée</span><span class="ps-pct" id="psPct">0%</span></div>
  <div class="ps-bar"><div class="ps-fill" id="psFill" style="width:0%"></div></div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-home" onclick="goTab('home')">🏠 Accueil</button>
  <button class="tab" id="tab-cl" onclick="goTab('cl')">✅ Checklist <span class="tb" id="tbRest">—</span></button>
  <button class="tab" id="tab-docs" onclick="goTab('docs')">📄 Documents <span class="tb" id="tbDocs">0</span></button>
</div>

<div class="main">

  <div class="view active" id="view-home">
    <div class="slabel">Échéance</div>
    <div class="dl-card">
      <div class="dl-top">
        <div><div class="dl-badge">Déclaration fiscale</div><div class="dl-name">Genève 2025</div></div>
        <div class="dl-cnt"><div class="dl-num" id="dlDays">—</div><div class="dl-unit">jours</div></div>
      </div>
      <div class="dl-date">Date limite : <strong>31 mars 2026</strong></div>
      <div class="dl-pb"><div class="dl-pf" id="dlFill" style="width:0%"></div></div>
      <div class="dl-pl"><span>1 jan 2026</span><span id="dlPct">0%</span></div>
    </div>
    <div class="slabel">Avancement checklist</div>
    <div id="homeChecklist"></div>
    <div class="slabel">Documents récents</div>
    <div id="homeDocs"></div>
    <div id="homePdfBanner" style="margin-top:16px"></div>
  </div>

  <div class="view" id="view-cl">
    <div id="fullCL"></div>
  </div>

  <div class="view" id="view-docs">
    <div id="docsPdfBanner" style="margin-top:4px;margin-bottom:8px"></div>
    <div id="docsList"></div>
  </div>

</div>

<button class="fab" onclick="openAddModal(null)" title="Ajouter un document">＋</button>

<nav class="bnav">
  <button class="ni active" id="ni-home" onclick="goTab('home')"><span class="ni-ico">🏠</span><span class="ni-lbl">Accueil</span></button>
  <button class="ni" id="ni-cl" onclick="goTab('cl')"><span class="ni-ico">✅</span><span class="ni-lbl">Checklist</span></button>
  <button class="ni" id="ni-docs" onclick="goTab('docs')"><span class="ni-ico">📄</span><span class="ni-lbl">Documents</span></button>
</nav>

<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal"><div class="mhandle"></div><div id="mbody"></div></div>
</div>

<div class="pdf-ov" id="pdfOv">
  <div class="pdf-ov-ico spin" id="pdfOvIco">⚙️</div>
  <div class="pdf-ov-title" id="pdfOvTitle">Génération du PDF…</div>
  <div class="pdf-ov-sub" id="pdfOvSub">Préparation</div>
  <div class="pdf-ov-bar"><div class="pdf-ov-fill" id="pdfOvFill"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ CHECKLIST ══
const CL = [
  { id:'revenus', icon:'💼', name:'Revenus', items:[
    { id:'salaire',   name:'Certificat de salaire',          sub:'Formulaire AFC — employeur',          kw:['certificat','salaire','employeur','avs','laa'] },
    { id:'salaire2',  name:'Certificat de salaire (2ème)',   sub:'Si plusieurs employeurs',             kw:['certificat','salaire'] },
    { id:'indem',     name:'Indemnités chômage / APG',       sub:'Attestation ORP ou caisse comp.',     kw:['chomage','indemnite','apg','orp','chômage'] },
    { id:'rentes',    name:'Rentes AVS / AI',                sub:'Attestation annuelle',                kw:['avs','ai','rente','pension'] },
    { id:'lpp_r',     name:'Rente LPP / caisse de pension',  sub:'Si prestations en cours',             kw:['lpp','caisse','pension','rente'] },
  ]},
  { id:'banques', icon:'🏦', name:'Comptes & Fortune', items:[
    { id:'ubs',       name:'Relevé bancaire UBS',            sub:'Solde + intérêts au 31.12.2025',      kw:['ubs','banque','releve','compte','solde','interets'] },
    { id:'post',      name:'Relevé PostFinance',             sub:'Solde + intérêts au 31.12.2025',      kw:['postfinance','post','banque','releve'] },
    { id:'autrebank', name:'Relevé autre banque',            sub:'BCGE, Raiffeisen, neon, Migros…',     kw:['banque','releve','compte','solde','raiffeisen','bcge','migros','neon'] },
    { id:'titres',    name:'Relevé titres / placements',     sub:'Actions, fonds, bons de caisse',      kw:['titres','placements','fonds','actions','portefeuille','bons','depot'] },
    { id:'intcred',   name:'Attestation intérêts créditeurs',sub:'Intérêts reçus sur épargne',          kw:['interets','crediteurs','epargne'] },
    { id:'cryptos',   name:'Cryptomonnaies',                 sub:'Valeur CHF au 31.12.2025',            kw:['crypto','bitcoin','btc','eth','coinbase','binance','ledger'] },
  ]},
  { id:'assurances', icon:'🛡️', name:'Assurances', items:[
    { id:'lamal',     name:'Attestation primes LAMal',       sub:'Total primes 2025 payées',            kw:['lamal','assurance','maladie','css','helsana','swica','primes','sante','santé'] },
    { id:'lca',       name:'Attestation complémentaire LCA', sub:'Semi-privée, privée, dentaire…',      kw:['lca','complementaire','semi','privee','dent'] },
    { id:'lpp',       name:'Certificat prévoyance LPP',      sub:'Capital épargne au 31.12.2025',       kw:['lpp','prevoyance','caisse','pension','2eme','pilier'] },
    { id:'p3a',       name:'Attestation 3ème pilier (3a)',   sub:'Versements déductibles 2025',         kw:['3a','troisieme','pilier','prevoyance','liee'] },
    { id:'p3b',       name:'Attestation 3ème pilier (3b)',   sub:'Valeur de rachat au 31.12.2025',      kw:['3b','assurance','vie','capital','rachat'] },
  ]},
  { id:'dedpro', icon:'✂️', name:'Déductions professionnelles', items:[
    { id:'transport', name:'Abonnement TPG / CFF',           sub:'AG, abonnement mensuel ou annuel',    kw:['tpg','cff','transports','ag','abonnement','transport'] },
    { id:'formation', name:'Frais de formation',             sub:'Cours, CAS, MAS, formation pro',      kw:['formation','cours','ecole','universite','cas','mas'] },
    { id:'repas',     name:'Frais de repas hors domicile',   sub:'Si > 30 min de trajet ou cantine',    kw:['repas','restaurant','cantine','dejeuner'] },
  ]},
  { id:'dedpers', icon:'💡', name:'Déductions personnelles', items:[
    { id:'garde',     name:'Frais de garde d\'enfants',      sub:'Crèche, garderie, maman de jour',     kw:['garde','creche','garderie','maman','babysitter','enfant','nounou'] },
    { id:'pension_a', name:'Pensions alimentaires versées',  sub:'Justificatifs de paiement',           kw:['pension','alimentaire','divorce','enfant'] },
    { id:'dons',      name:'Dons et libéralités',            sub:'Reçus organismes (min. CHF 100)',      kw:['don','liberalite','association','fondation','recu'] },
    { id:'fraismed',  name:'Frais médicaux importants',      sub:'> 5% du revenu — quittances',         kw:['medecin','hopital','pharmacie','frais','medicaux','dentiste','chirurgie'] },

// ══ AUTO-CLASSEMENT ══
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function detectMatches(text){
  const n = norm(text);
  const res=[];
  for(const g of CL) for(const item of g.items){
    const sc = item.kw.filter(k=>n.includes(norm(k))).length;
    if(sc>0) res.push({item,group:g,sc});
  }
  return res.sort((a,b)=>b.sc-a.sc);
}
function detectCat(text){
  const m=detectMatches(text);
  return m.length ? m[0].group.id : 'revenus';
}

  if(ed&&ed.fileData){
    pendingFile={name:ed.name,type:ed.fileType,dataURL:ed.fileData};
    showFilePrev(ed.name);
  }
  if(ed) setTimeout(onNameInput,60);

function onFileChange(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingFile={name:file.name,type:file.type,dataURL:ev.target.result};
    showFilePrev(file.name);
    const el=document.getElementById('dName');
    if(el&&!el.value) el.value=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    onNameInput();
  };
  reader.readAsDataURL(file);
}

function showFilePrev(name){
  const wrap=document.getElementById('fileZoneWrap'); if(!wrap) return;
  const ext=name.split('.').pop().toLowerCase();
  const ico=ext==='pdf'?'📄':['jpg','jpeg','png','heic','webp'].includes(ext)?'🖼️':'📎';
  wrap.innerHTML=`<div class="file-prev">
    <span class="fp-ico">${ico}</span>
    <span class="fp-nm">${name}</span>
    <button class="fp-rm" onclick="removeFile()">✕</button>
  </div>`;
}
function removeFile(){
  pendingFile=null;
  const wrap=document.getElementById('fileZoneWrap'); if(!wrap) return;
  wrap.innerHTML=`<div class="file-zone">
    <input type="file" id="fileInput" accept="image/*,application/pdf" onchange="onFileChange(event)">
    <div class="fz-ico">📎</div><div class="fz-lbl">Appuyer pour choisir</div>
    <div class="fz-sub">📷 Photo · 🖼 Image · 📄 PDF</div>
  </div>`;
}

function onNameInput(){
  const name=(document.getElementById('dName')?.value||'');
  const src=name+(pendingFile?' '+pendingFile.name:'');
  const matches=detectMatches(src);
  if(!matches.length){ document.getElementById('matchBox').innerHTML=''; return; }
  const top=matches.slice(0,5);
  top.forEach(m=>{ if(m.sc>=1&&!(m.item.id in scanSel)) scanSel[m.item.id]=true; });
  if(top[0]) document.getElementById('dCat').value=top[0].group.id;
  document.getElementById('matchBox').innerHTML=`<div class="match-wrap">
    <div class="match-hd">✨ Items détectés — ajuste si besoin</div>
    ${top.map(m=>`<div class="match-row" onclick="toggleMatch('${m.item.id}')">
      <div class="match-cb ${scanSel[m.item.id]?'sel':''}" id="mcb-${m.item.id}">${scanSel[m.item.id]?'✓':''}</div>
      <div><div class="match-nm">${m.item.name}</div><div class="match-grp">${m.group.icon} ${m.group.name}</div></div>
    </div>`).join('')}
  </div>`;
}
function toggleMatch(id){
  scanSel[id]=!scanSel[id];
  const cb=document.getElementById('mcb-'+id);
  if(cb){ cb.classList.toggle('sel',scanSel[id]); cb.textContent=scanSel[id]?'✓':''; }
}

function confirmAdd(editId){
  const name=(document.getElementById('dName')?.value||'').trim();
  if(!name){ showToast('⚠️ Saisis un nom'); return; }
  const cat=document.getElementById('dCat')?.value||'revenus';
  const note=document.getElementById('dNote')?.value?.trim()||'';
  const linked=Object.keys(scanSel).filter(k=>scanSel[k]);

  if(editId&&editId!=='null'){
    const doc=S.docs.find(d=>d.id===editId);
    if(doc){
      if(doc.linked) doc.linked.forEach(lid=>{ delete S.checked[lid]; });
      Object.assign(doc,{name,cat,note,linked});
      if(pendingFile){ doc.fileData=pendingFile.dataURL; doc.fileType=pendingFile.type; }
    }
  } else {
    S.docs.unshift({id:Date.now().toString(),name,cat,note,date:Date.now(),linked,fileData:pendingFile?.dataURL||null,fileType:pendingFile?.type||null});
  }

  linked.forEach(id=>{ S.checked[id]=true; });
  save(); closeOverlay(); refreshAll();
  showToast(linked.length>0?`✅ Enregistré · ${linked.length} item(s) coché(s)`:'✅ Document enregistré');
}

// ══ EXPORT PDF ══
async function exportPDF(){
  const withFile=S.docs.filter(d=>d.fileData);
  if(!withFile.length){ showToast('⚠️ Aucun fichier joint à exporter'); return; }

  const ov=document.getElementById('pdfOv'), sub=document.getElementById('pdfOvSub');
  const fill=document.getElementById('pdfOvFill'), ico=document.getElementById('pdfOvIco');
  const title=document.getElementById('pdfOvTitle');

  ov.classList.add('show');
  ico.className='pdf-ov-ico spin'; title.textContent='Génération du PDF…';
  sub.textContent='Initialisation…'; fill.style.width='0%';

  try{
    const { PDFDocument, rgb, StandardFonts } = PDFLib;
    const merged=await PDFDocument.create();
    const font=await merged.embedFont(StandardFonts.HelveticaBold);
    const fontReg=await merged.embedFont(StandardFonts.Helvetica);

    // ── Couverture ──
    sub.textContent='Page de couverture'; fill.style.width='4%';
    const cp=merged.addPage([595,842]);
    cp.drawRectangle({x:0,y:0,width:595,height:842,color:rgb(0.027,0.035,0.059)});
    cp.drawRectangle({x:0,y:762,width:595,height:80,color:rgb(0.14,0.31,0.74)});
    cp.drawText('DÉCLARATION FISCALE 2025',{x:30,y:810,size:20,font,color:rgb(1,1,1)});
    cp.drawText('Genève — Dossier personnel',{x:30,y:788,size:12,font:fontReg,color:rgb(0.8,0.88,1)});
    const today=new Date().toLocaleDateString('fr-CH',{day:'numeric',month:'long',year:'numeric'});
    cp.drawText(`Généré le ${today}`,{x:30,y:750,size:10,font:fontReg,color:rgb(0.4,0.5,0.65)});
    cp.drawText('SOMMAIRE DES DOCUMENTS',{x:30,y:715,size:9,font,color:rgb(0.35,0.55,0.95)});

    const sorted=[...withFile].sort((a,b)=>{
      const gi=id=>CL.findIndex(g=>g.id===id);
      return gi(a.cat)-gi(b.cat)||a.name.localeCompare(b.name);
    });
    let yy=695;
    for(const doc of sorted){
      if(yy<80) break;
      cp.drawText(`• ${doc.name}`.substring(0,70),{x:30,y:yy,size:10,font:fontReg,color:rgb(0.82,0.87,1)});
      cp.drawText(catName(doc.cat),{x:420,y:yy,size:9,font:fontReg,color:rgb(0.4,0.5,0.65)});
      yy-=16;
    }
    cp.drawText(`Total : ${sorted.length} document(s) avec fichier`,{x:30,y:50,size:9,font,color:rgb(0.3,0.4,0.55)});

    // ── Documents ──
    for(let i=0;i<sorted.length;i++){
      const doc=sorted[i];
      const pct=Math.round(8+(i/sorted.length)*86);
      sub.textContent=`${i+1}/${sorted.length} — ${doc.name}`;
      fill.style.width=pct+'%';
      await new Promise(r=>setTimeout(r,0));

      try{
        if(doc.fileType==='application/pdf'){
          // ── Page séparatrice ──
          const sp=merged.addPage([595,842]);
          sp.drawRectangle({x:0,y:0,width:595,height:842,color:rgb(0.04,0.05,0.09)});
          sp.drawRectangle({x:0,y:790,width:595,height:52,color:rgb(0.1,0.2,0.5)});
          sp.drawText(doc.name.substring(0,54),{x:20,y:818,size:15,font,color:rgb(1,1,1)});
          sp.drawText(catName(doc.cat),{x:20,y:800,size:9,font:fontReg,color:rgb(0.6,0.75,1)});
          sp.drawText('Document PDF',{x:20,y:760,size:10,font:fontReg,color:rgb(0.4,0.5,0.65)});
          if(doc.note) sp.drawText(`Note : ${doc.note.substring(0,80)}`,{x:20,y:742,size:9,font:fontReg,color:rgb(0.5,0.6,0.75)});

          const b64=doc.fileData.split(',')[1];
          const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
          let srcPdf;
          try{ srcPdf=await PDFDocument.load(bytes,{ignoreEncryption:true}); }
          catch(e){ sp.drawText('⚠ Fichier PDF non lisible',{x:20,y:400,size:14,font,color:rgb(1,0.5,0.3)}); continue; }
          const pages=await merged.copyPages(srcPdf,srcPdf.getPageIndices());
          pages.forEach(p=>merged.addPage(p));

        } else {
          // ── Image ──
          const b64=doc.fileData.split(',')[1];
          const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
          let img;
          try{
            img=doc.fileType==='image/png'?await merged.embedPng(bytes):await merged.embedJpg(bytes);
          }catch(e){
            try{ img=await merged.embedJpg(bytes); }
            catch(e2){ try{ img=await merged.embedPng(bytes); }catch(e3){ continue; } }
          }
          const dims=img.scale(1);
          const maxW=535, maxH=730;
          const scale=Math.min(maxW/dims.width,maxH/dims.height,1);
          const iw=dims.width*scale, ih=dims.height*scale;

          const ip=merged.addPage([595,842]);
          ip.drawRectangle({x:0,y:0,width:595,height:842,color:rgb(0.04,0.05,0.09)});
          ip.drawRectangle({x:0,y:800,width:595,height:42,color:rgb(0.1,0.2,0.5)});
          ip.drawText(doc.name.substring(0,54),{x:20,y:822,size:13,font,color:rgb(1,1,1)});
          ip.drawText(catName(doc.cat),{x:20,y:806,size:9,font:fontReg,color:rgb(0.6,0.75,1)});
          ip.drawImage(img,{x:(595-iw)/2,y:(760-ih)/2+20,width:iw,height:ih});
          if(doc.note) ip.drawText(`Note : ${doc.note.substring(0,80)}`,{x:20,y:16,size:9,font:fontReg,color:rgb(0.4,0.5,0.65)});
        }
      }catch(err){ console.warn('Skipped:',doc.name,err); }
    }

    // ── Sauvegarder ──
    sub.textContent='Finalisation…'; fill.style.width='97%';
    await new Promise(r=>setTimeout(r,60));
    const pdfBytes=await merged.save();
    fill.style.width='100%';

    const blob=new Blob([pdfBytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`Impots_GE_2025_${new Date().toISOString().slice(0,10)}.pdf`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);

    await new Promise(r=>setTimeout(r,500));
    ico.className='pdf-ov-ico'; ico.textContent='✅';
    title.textContent='PDF généré !';
    sub.textContent=`${sorted.length} document(s) — téléchargement en cours`;
    setTimeout(()=>{ ov.classList.remove('show'); ico.textContent='⚙️'; ico.className='pdf-ov-ico spin'; },2200);
    showToast(`✅ PDF exporté — ${sorted.length} documents`);

  }catch(err){
    console.error(err);
    ov.classList.remove('show');
    showToast('❌ Erreur lors de la génération PDF');
  }
}

// ══ NAVIGATION ══
function goTab(t){
  ['home','cl','docs'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('active',v===t);
    document.getElementById('tab-'+v).classList.toggle('active',v===t);
    document.getElementById('ni-'+v).classList.toggle('active',v===t);
  });
  if(t==='cl') renderFullCL();
  if(t==='docs') renderDocs();
}

// ══ OVERLAY ══
function openOverlay(){ document.getElementById('overlay').classList.add('open'); }
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); }
function overlayBg(e){ if(e.target===document.getElementById('overlay')) closeOverlay(); }

// ══ TOAST ══
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

// ══ REFRESH ══
function refreshAll(){
  updateProgress(); renderHomeCL(); renderHomeDocs(); renderPdfBanners();
  const av=document.querySelector('.view.active');
  if(av?.id==='view-cl') renderFullCL();
  if(av?.id==='view-docs') renderDocs();
}

refreshAll();
</script>
